<!DOCTYPE html>
<html>
<head>
  <title>Debounce & Throttle Full Example</title>
</head>
<body>

  <h2>Debounce Example (Search Input)</h2>
  <input type="text" id="searchBox" placeholder="Type to search..." />

  <h2>Throttle Example (Scroll)</h2>
  <div style="height: 2000px; background: linear-gradient(white, gray);">
    Scroll Down 👇
  </div>

  <script>
    // 🔹 Debounce Function
    function debounce(func, delay) {
      let timer;

      return function (...args) {
        clearTimeout(timer);

        timer = setTimeout(() => {
          func.apply(this, args);
        }, delay);
      };
    }

    // 🔹 Throttle Function
    function throttle(func, limit) {
      let lastCall = 0;

      return function (...args) {
        const now = Date.now();

        if (now - lastCall >= limit) {
          lastCall = now;
          func.apply(this, args);
        }
      }
    }

    // -------------------------
    // 🔥 Debounce Example
    // -------------------------
    const searchBox = document.getElementById("searchBox");

    const handleSearch = debounce((event) => {
      console.log("Searching for:", event.target.value);
    }, 500);

    searchBox.addEventListener("input", handleSearch);

    // -------------------------
    // 🔥 Throttle Example
    // -------------------------
    const handleScroll = throttle(() => {
      console.log("Scrolling at:", new Date().toLocaleTimeString());
    }, 1000);

    window.addEventListener("scroll", handleScroll);

  </script>

</body>
</html>
