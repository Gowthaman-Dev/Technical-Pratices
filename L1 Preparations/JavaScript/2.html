<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
       let arr = [1,[2,3],[4,[5,6]]]
       let result = []

       function arrs(nums){

       for(let i = 0 ; i <nums.length ; i ++){
        if (Array.isArray(nums[i])) {
            arrs(nums[i])
        }else{
            result.push(nums[i])
        }
       }
       }

       arrs(arr)

       console.log(result);
       
    </script>

</body>

</html>
