<!DOCTYPE html>
<html>
<head>
    <title>Change Text</title>
</head>
<body>

    <p id="para">This is original text</p>

    <button onclick="changeText()">Click Me</button>

    <script>
        function changeText() {
            document.getElementById("para").innerText = "Text Changed!";
        }
    </script>

</body>
</html>
