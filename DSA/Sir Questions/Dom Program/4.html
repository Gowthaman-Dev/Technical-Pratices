<!DOCTYPE html>
<html>
<head>
    <title>Hide Paragraph</title>
</head>
<body>

    <p id="para">This text will disappear</p>
    <button onclick="hideText()">Hide</button>

    <script>
        function hideText() {
            document.getElementById("para").style.display = "none";
        }
    </script>

</body>
</html>
