<!DOCTYPE html>
<html>
<head>
    <title>Show Div</title>
</head>
<body>

    <button onclick="showDiv()">Show Div</button>

    <div id="myDiv" style="display: none;">
        This is a hidden div
    </div>

    <script>
        function showDiv() {
            document.getElementById("myDiv").style.display = "block";
        }
    </script>

</body>
</html>
