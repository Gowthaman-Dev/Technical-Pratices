<!DOCTYPE html>
<html>
<head>
    <title>Find Larger Number</title>
</head>
<body>

    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <button onclick="findLarger()">Find Larger</button>

    <p id="output"></p>

    <script>
        function findLarger() {
            let n1 = Number(document.getElementById("num1").value);
            let n2 = Number(document.getElementById("num2").value);

            if (n1 > n2) {
                document.getElementById("output").innerText = "First number is larger";
            } else if (n2 > n1) {
                document.getElementById("output").innerText = "Second number is larger";
            } else {
                document.getElementById("output").innerText = "Both are equal";
            }
        }
    </script>

</body>
</html>
